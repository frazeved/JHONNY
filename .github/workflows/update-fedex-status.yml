name: Update FedEx Status

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false

jobs:
  update-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run FedEx status update
        env:
          FEDEX_API_KEY: ${{ secrets.FEDEX_API_KEY }}
          FEDEX_API_SECRET: ${{ secrets.FEDEX_API_SECRET }}
          FEDEX_ACCOUNT_NUMBER: ${{ secrets.FEDEX_ACCOUNT_NUMBER }}
          FEDEX_ENV: ${{ secrets.FEDEX_ENV }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/update_status.js

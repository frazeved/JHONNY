name: Create FedEx Labels

on:
  workflow_dispatch:
    inputs:
      po_numbers:
        description: 'Comma-separated PO numbers to generate labels for'
        required: true
        type: string

jobs:
  create-labels:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create FedEx labels
        env:
          FEDEX_API_KEY:               ${{ secrets.FEDEX_API_KEY }}
          FEDEX_API_SECRET:            ${{ secrets.FEDEX_API_SECRET }}
          FEDEX_ACCOUNT_NUMBER:        ${{ secrets.FEDEX_ACCOUNT_NUMBER }}
          FEDEX_ENV:                   ${{ secrets.FEDEX_ENV }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_APPS_SCRIPT_URL:      ${{ secrets.GDRIVE_APPS_SCRIPT_URL }}
          GDRIVE_APPS_SCRIPT_SECRET:   ${{ secrets.GDRIVE_APPS_SCRIPT_SECRET }}
          PO_NUMBERS:                  ${{ github.event.inputs.po_numbers }}
        run: node scripts/create_labels.js
